services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
      - 443:443/udp
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      gov:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_healthy
  gov:
    image: ghcr.io/lexmiin/babyn-yar-gov:latest
    restart: unless-stopped
    expose:
      - 4321
    depends_on:
      api:
        condition: service_healthy
  admin:
    image: ghcr.io/lexmiin/babyn-yar-admin:latest
    restart: unless-stopped
    expose:
      - 80
    depends_on:
      api:
        condition: service_healthy
  api:
    image: ghcr.io/lexmiin/babyn-yar-api:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - 8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
      - "POSTGRES_USER=${POSTGRES_USER}"
      - "POSTGRES_DB=${POSTGRES_DB}"
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7.0.11-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
  migrate:
    image: migrate/migrate:v4.16.2
    profiles:
      - "tools"
    volumes:
      - ./migrations:/migrations
    entrypoint:
      - "migrate"
      - "-path"
      - "/migrations"
      - "-database"
      - "${DATABASE_URL}"
    command:
      - "up"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
volumes:
  caddy-data:
  caddy-config:
  db-data:
  redis:
